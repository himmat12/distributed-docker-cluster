services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 2s
      retries: 10
  
  worker:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      redis:
        condition: service_healthy
    command: celery -A tasks worker --loglevel=info
    healthcheck:
      test: ["CMD", "celery", "celery -A tasks inspect ping"]
      interval: 3s
      timeout: 3s

  producer:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      worker:
        condition: service_healthy
    command: python trigger.py